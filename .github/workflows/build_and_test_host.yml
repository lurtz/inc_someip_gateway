# Workflow configuration for S-CORE CI - Bazel Build & Test module
# This workflow runs Bazel build and test when triggered by specific pull request events.

name: Build & Test module (with host toolchain)
on:
  workflow_call:
jobs:
  build_and_test_host:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    steps:
      - uses: eclipse-score/more-disk-space@v1
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Create Bazel output base directory
        run: |
          sudo mkdir -p /mnt/.bazel
          sudo chown -R $USER:$USER /mnt/.bazel
      - name: Create config indicator file
        run: echo "host" > .bazel_config
      - name: Setup Bazel
        uses: elektrobit-contrib/eclipse-score_cicd-actions/setup-bazel-cache@use-lurtz-setup-bazel
        with:
          unique-cache-name: ${{ github.job }}
      - name: Allow linux-sandbox
        uses: eclipse-score/cicd-actions/unblock-user-namespace-for-linux-sandbox@659dcbed63f6b7fbde88c7850125ea0a0a92f939
      - run: df -h
      - name: Bazel build targets
        run: |
          bazel build //...
      - run: df -h
        if: always()
      - name: Bazel test targets
        run: |
          bazel test //... --build_tests_only
      - run: df -h
        if: always()
