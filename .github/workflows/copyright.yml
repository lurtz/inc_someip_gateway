name: Copyright checks
on:
  workflow_call:

permissions:
  contents: read
  actions: write # needed for cache deletion at setup-bazel-cache
jobs:
  copyright-check:
    uses: elektrobit-contrib/score_cicd-workflows/.github/workflows/copyright.yml@590ce6b04b7964f0986e0a138f5fb57589f95a51
    with:
      bazel-target: "run //:copyright.check"
