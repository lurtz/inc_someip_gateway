name: Documentation

permissions:
  contents: write
  pages: write
  pull-requests: write
  id-token: write
  actions: write # needed for cache deletion at setup-bazel-cache

on:
  # push:
  #   branches:
  #     - main
  workflow_call:

jobs:
  build-docs:
    uses: elektrobit-contrib/eclipse-score_cicd-workflows/.github/workflows/docs.yml@590ce6b04b7964f0986e0a138f5fb57589f95a51
    permissions:
      contents: write
      pages: write
      pull-requests: write
      id-token: write
      actions: write # needed for cache deletion at setup-bazel-cache

    with:
      # the bazel-target depends on your repo specific docs_targets configuration (e.g. "suffix")
      bazel-target: "//:docs -- --github_user=${{ github.repository_owner }} --github_repo=${{ github.event.repository.name }}"
      retention-days: 3
