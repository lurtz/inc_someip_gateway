name: License Check

on:
  push:
    branches:
      - main
  workflow_call:

permissions:
  pull-requests: write
  issues: write
  actions: write # needed for cache deletion at setup-bazel-cache

jobs:
  license-check:
    uses: elektrobit-contrib/score_cicd-workflows/.github/workflows/license-check.yml@590ce6b04b7964f0986e0a138f5fb57589f95a51
    secrets:
      dash-api-token: ${{ secrets.ECLIPSE_GITLAB_API_TOKEN }}
