name: Publish Documentation

on:
  workflow_run:
    workflows: ["CI", "Cache maintenance"]
    types:
      - completed

jobs:
  docs-deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' && !(
        github.event.workflow_run.name == 'Cache maintenance' &&
        github.event.workflow_run.event == 'pull_request'
      )
    uses: eclipse-score/cicd-workflows/.github/workflows/docs-publish.yml@secure-docs
    permissions:
      pages: write
      id-token: write
      contents: write
      pull-requests: write
      actions: write
