name: Cache maintenance

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  repository_cache_maintenance:
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
      contents: read
    secrets: inherit
    uses: ./.github/workflows/repository_cache_maintenance.yml

  ci:
    needs:
      - repository_cache_maintenance
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
      contents: read
    secrets: inherit
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/ci.yml

  ci_pull_request_target:
    needs:
      - repository_cache_maintenance
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
      contents: write
      pages: write
      pull-requests: write
      id-token: write
      issues: write
    secrets: inherit
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/ci_pull_request_target.yml
