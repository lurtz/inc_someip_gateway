name: License Check

on:
  push:
    branches:
      - main
  workflow_call:

permissions:
  pull-requests: write
  issues: write

jobs:
  license-check:
    uses: eclipse-score/cicd-workflows/.github/workflows/license-check.yml@39939c97ac17f9e262860cf325bdd52d4a2d21a5 # main (2026-05-18)
    secrets:
      dash-api-token: ${{ secrets.ECLIPSE_GITLAB_API_TOKEN }}
