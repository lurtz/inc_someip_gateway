name: Documentation Cleanup

permissions:
  contents: write
  pages: write
  id-token: write

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC

jobs:
  docs-cleanup:
    uses: etas-contrib/score_cicd-workflows/.github/workflows/docs-cleanup.yml@6fa9a537d758f866f164f2629f45af7fe712129f
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
