name: Nightly Cache Refresh

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  check_recent_default_branch_activity:
    name: Check default branch activity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Check latest default branch commit age
        id: check
        run: |
          # should_run is true if there was at least one commit in the last 24 hours, false otherwise
          last_commits="$(git log --since="24 hours ago" --oneline)"
          if [ -n "$last_commits" ]; then
            echo "Recent activity detected on the default branch. Proceeding with cache refresh."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No recent activity on the default branch. Skipping cache refresh to save resources."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # Jobs are run sequentially to avoid race conditions on repository cache deletion and recreation.
  # They will be running even if previous jobs failed, as long as the default branch had recent activity and the workflow was not manually cancelled.
  delete_all_caches:
    needs: check_recent_default_branch_activity
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    name: Delete all GitHub Actions caches
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete all caches in this repository
        run: gh cache delete --repo ${{ github.repository }} --all

  create_repository_cache:
    name: Create repository cache (${{ matrix.bazel-config }})
    needs:
      - delete_all_caches
      - check_recent_default_branch_activity
    runs-on: ubuntu-24.04
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - bazel-config: "x86_64-linux"
          #   bazel-target: "//..."
          # - bazel-config: "aarch64-linux"
          #   bazel-target: "//..."
          - bazel-config: "x86_64-qnx"
            bazel-target: "//src/... //tests/..."
            # - bazel-config: "aarch64-qnx"
            #   bazel-target: "//src/... //tests/..."
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
      queue: max
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
      contents: read
    steps:
      - uses: eclipse-score/more-disk-space@v1
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Create Bazel output base directory
        run: |
          sudo mkdir -p /mnt/.bazel
          sudo chown -R $USER:$USER /mnt/.bazel
      - name: Create config indicator file
        run: echo "${{ matrix.bazel-config }}" > .bazel_config
      - name: Setup Bazel
        uses: eclipse-score/cicd-actions/setup-bazel-cache@659dcbed63f6b7fbde88c7850125ea0a0a92f939
        with:
          unique-cache-name: ${{ github.job }}-${{ matrix.bazel-config }}

      - name: Setup QNX SDP usage
        uses: eclipse-score/cicd-actions/setup-qnx-sdp@a2b3c36fc7d1b9d03880d19935c7ac9cfffe58c6 # 2026-05-19
        with:
          qnx-license: ${{ secrets.score-qnx-license }}
          # qnx-license-server: ${{ inputs.score-qnx-license-server }}
          qnx-user: ${{ secrets.score-qnx-user }}
          qnx-password: ${{ secrets.score-qnx-password }}
          # qnx-credential-helper: ${{ inputs.credential-helper }}
          qnx-license-dir: /opt/score_qnx/license

      - name: Warm Bazel repository cache (with retries)
        run: |
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Running bazel fetch for --config=${{ matrix.bazel-config }} and targets '${{ matrix.bazel-target }}' (attempt ${attempt}/${max_attempts})"
            if bazel fetch --config="${{ matrix.bazel-config }}" ${{ matrix.bazel-target }}; then
              echo "Successfully fetched dependencies for --config=${{ matrix.bazel-config }} and targets '${{ matrix.bazel-target }}'"
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              backoff_seconds=$((attempt * 20))
              echo "bazel fetch failed (likely transient). Retrying in ${backoff_seconds}s..."
              sleep "$backoff_seconds"
            fi
          done

          echo "bazel fetch failed for --config=${{ matrix.bazel-config }} and targets '${{ matrix.bazel-target }}' after ${max_attempts} attempts"
          exit 1

  pre-commit:
    needs:
      - create_repository_cache
      - check_recent_default_branch_activity
    secrets: inherit
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    uses: ./.github/workflows/pre-commit.yml

  build_and_test_host:
    needs:
      - create_repository_cache
      - check_recent_default_branch_activity
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
    secrets: inherit
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    uses: ./.github/workflows/build_and_test_host.yml

  build_and_test_cross_compilation:
    needs:
      - create_repository_cache
      - check_recent_default_branch_activity
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
    secrets: inherit
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    uses: ./.github/workflows/build_and_test_cross_compilation.yml

  copyright:
    needs:
      - create_repository_cache
      - check_recent_default_branch_activity
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
      contents: read
    secrets: inherit
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    uses: ./.github/workflows/copyright.yml

  format:
    needs:
      - create_repository_cache
      - check_recent_default_branch_activity
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
      contents: read
    secrets: inherit
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    uses: ./.github/workflows/format.yml

  build_and_test_qnx:
    runs-on: ubuntu-latest
    needs:
      - create_repository_cache
      - check_recent_default_branch_activity
    # secrets: inherit
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    # uses: ./.github/workflows/build_and_test_qnx.yml
    # permissions:
    #   actions: write # needed for cache deletion at setup-bazel-cache
    #   contents: read
    #   pull-requests: read
    steps:
      - run: df -h

  docs:
    runs-on: ubuntu-latest
    needs:
      - create_repository_cache
      - check_recent_default_branch_activity
    # secrets: inherit
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    # uses: ./.github/workflows/docs.yml
    # permissions:
    #   actions: write # needed for cache deletion at setup-bazel-cache
    #   contents: write
    #   pages: write
    #   pull-requests: write
    #   id-token: write
    steps:
      - run: df -h

  license_check:
    needs:
      - create_repository_cache
      - check_recent_default_branch_activity
    secrets: inherit
    if: ${{ !cancelled() && needs.check_recent_default_branch_activity.outputs.should_run == 'true' }}
    uses: ./.github/workflows/license_check.yml
    permissions:
      actions: write # needed for cache deletion at setup-bazel-cache
      pull-requests: write
      issues: write
