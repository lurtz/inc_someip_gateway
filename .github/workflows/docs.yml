name: Documentation

permissions:
  contents: write
  pages: write
  pull-requests: write
  id-token: write
  actions: write # needed for cache deletion at setup-bazel-cache

on:
  push:
    branches:
      - main
  workflow_call:

jobs:
  build-docs:
    uses: etas-contrib/score_cicd-workflows/.github/workflows/docs.yml@6fa9a537d758f866f164f2629f45af7fe712129f
    permissions:
      contents: write
      pages: write
      pull-requests: write
      id-token: write
      actions: write # needed for cache deletion at setup-bazel-cache

    with:
      # the bazel-target depends on your repo specific docs_targets configuration (e.g. "suffix")
      bazel-target: "//:docs -- --github_user=${{ github.repository_owner }} --github_repo=${{ github.event.repository.name }}"
      retention-days: 3
