name: Warm Main Branch Cache

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  repository_cache_maintenance:
    permissions:
      actions: write # needed for cache deletion after cache refresh
      contents: read
    secrets: inherit
    uses: ./.github/workflows/repository_cache_maintenance.yml

  ci:
    needs:
      - repository_cache_maintenance
    secrets: inherit
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/ci.yml

  ci_pull_request_target:
    needs:
      - repository_cache_maintenance
    permissions:
      contents: write
      pages: write
      pull-requests: write
      id-token: write
      issues: write
    secrets: inherit
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/ci_pull_request_target.yml

  delete_old_caches:
    runs-on: ubuntu-24.04
    needs:
      - ci
      - ci_pull_request_target
    permissions:
      actions: write # needed for deletion of old caches
      contents: read
    if: ${{ !cancelled() }}
    steps:
      - name: Prune obsolete Bazel caches
        uses: eclipse-score/cicd-actions/prune-cache@8e69f47b45778afd3b0d069c0456184c4ceeffe7
